<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FlowHR — 로그인</title>
  <link rel="stylesheet" href="css/design-system.css"/>
  <style>
    body {
      background: var(--surface-canvas);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-shell {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 960px;
      width: 100%;
      min-height: 600px;
      background: var(--surface-primary);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      margin: var(--sp-8);
    }

    /* Left: Brand panel */
    .login-brand {
      background: linear-gradient(160deg, #0d6a61 0%, #0b5a53 40%, #094e48 100%);
      color: white;
      padding: var(--sp-10);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-brand-logo {
      font-size: var(--text-3xl);
      font-weight: 800;
      margin-bottom: var(--sp-6);
      letter-spacing: -0.02em;
    }

    .login-brand h2 {
      font-size: var(--text-2xl);
      font-weight: 700;
      line-height: var(--leading-tight);
      margin-bottom: var(--sp-4);
    }

    .login-brand p {
      font-size: var(--text-md);
      opacity: 0.8;
      line-height: var(--leading-relaxed);
      margin-bottom: var(--sp-8);
    }

    /* Right: Form panel */
    .login-form-panel {
      padding: var(--sp-10);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-form-panel h1 {
      font-size: var(--text-3xl);
      font-weight: 700;
      margin-bottom: var(--sp-2);
    }

    .login-form-panel .login-desc {
      font-size: var(--text-md);
      color: var(--text-secondary);
      margin-bottom: var(--sp-8);
    }

    .login-form { max-width: 360px; }

    .login-form .form-group { margin-bottom: var(--sp-5); }

    .login-form .form-input {
      height: 44px;
      border-radius: var(--radius-md);
    }

    .login-submit {
      width: 100%;
      height: 44px;
      background: var(--brand-primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-md);
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 150ms;
    }

    .login-submit:hover {
      background: var(--brand-hover);
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      margin: var(--sp-6) 0;
      color: var(--text-tertiary);
      font-size: var(--text-sm);
    }

    .login-divider::before,
    .login-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-default);
    }

    .sso-buttons {
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }

    .sso-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      height: 44px;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      background: var(--surface-primary);
      font-size: var(--text-base);
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      font-family: inherit;
      transition: all 150ms;
    }

    .sso-btn:hover {
      background: var(--surface-secondary);
      border-color: var(--border-strong);
    }

    .login-footer {
      display: flex;
      justify-content: space-between;
      margin-top: var(--sp-6);
      font-size: var(--text-sm);
    }

    .login-footer a {
      color: var(--text-tertiary);
      text-decoration: none;
    }

    .login-footer a:hover { color: var(--brand-primary); }

    /* Demo quick access */
    .demo-access {
      margin-top: var(--sp-8);
      padding: var(--sp-4);
      background: var(--surface-secondary);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-default);
    }

    .demo-access-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: var(--sp-3);
    }

    .demo-links {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }

    .demo-link {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) var(--sp-3);
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: var(--text-primary);
      font-size: var(--text-sm);
      transition: background 120ms;
    }

    .demo-link:hover {
      background: var(--surface-primary);
      text-decoration: none;
    }

    .demo-link .demo-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .demo-link .demo-icon.p { background: #ede9fe; }
    .demo-link .demo-icon.a { background: var(--brand-soft); }
    .demo-link .demo-icon.e { background: #fef3c7; }

    .demo-link .demo-arrow {
      margin-left: auto;
      color: var(--text-tertiary);
    }

    @media (max-width: 768px) {
      .login-shell {
        grid-template-columns: 1fr;
        margin: var(--sp-4);
      }
      .login-brand { display: none; }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <!-- Left: Brand -->
    <div class="login-brand">
      <div class="login-brand-logo">FlowHR</div>
      <h2>하나의 계정으로<br/>모든 HR 업무를</h2>
      <p>근태, 휴가, 결재, 문서, 급여, 평가까지.<br/>하나의 플랫폼에서 모든 HR 업무를 처리하세요.</p>
    </div>

    <!-- Right: Form -->
    <div class="login-form-panel">
      <h1>로그인</h1>
      <p class="login-desc">이메일과 비밀번호를 입력하세요</p>

      <div class="login-form">
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input class="form-input" type="email" placeholder="name@company.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input class="form-input" type="password" placeholder="비밀번호 입력"/>
        </div>
        <button class="login-submit">로그인</button>

        <div class="login-divider">또는</div>

        <div class="sso-buttons">
          <button class="sso-btn">🔐 Google 계정으로 로그인</button>
          <button class="sso-btn">🏢 Microsoft 계정으로 로그인</button>
        </div>

        <div class="login-footer">
          <a href="#">비밀번호 찾기</a>
          <a href="landing.html">← 홈으로</a>
        </div>

        <!-- Demo quick access for wireframe review -->
        <div class="demo-access">
          <div class="demo-access-title">🎯 와이어프레임 빠른 접근</div>
          <div class="demo-links">
            <a class="demo-link" href="platform/console.html">
              <div class="demo-icon p">⚙</div>
              Platform Operator로 로그인
              <span class="demo-arrow">→</span>
            </a>
            <a class="demo-link" href="admin/home.html">
              <div class="demo-icon a">🏢</div>
              Tenant Admin으로 로그인
              <span class="demo-arrow">→</span>
            </a>
            <a class="demo-link" href="employee/home.html">
              <div class="demo-icon e">👤</div>
              Tenant Employee로 로그인
              <span class="demo-arrow">→</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
